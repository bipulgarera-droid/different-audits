<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgencyOS | SEO Agency Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'Inter', 'sans-serif'],
                    },
                    colors: {
                        gray: {
                            900: '#111827',
                            950: '#0B0F19',
                        },
                        violet: {
                            500: '#8B5CF6',
                            600: '#7C3AED',
                        },
                    },
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap');

        html {
            font-size: 13px;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0B0F19;
        }

        .top-tab {
            padding: 0.5rem 1rem;
            border-bottom: 2px solid transparent;
        }

        .top-tab.active {
            border-bottom-color: #8B5CF6;
            color: white;
        }

        .top-tab:hover {
            color: white;
        }

        .side-tab {
            padding: 0.5rem 0.75rem;
            border-left: 2px solid transparent;
        }

        .side-tab.active {
            border-left-color: #8B5CF6;
            background: rgba(139, 92, 246, 0.1);
            color: white;
        }

        .side-tab:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0B0F19;
        }

        ::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 3px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.15s ease-out forwards;
        }
    </style>
</head>

<body class="bg-gray-950 text-gray-100 h-screen flex flex-col overflow-hidden">

    <!-- Top Header Bar -->
    <header class="bg-gray-900 border-b border-gray-800 shrink-0">
        <div class="flex items-center justify-between px-4 h-12">
            <!-- Logo -->
            <div class="flex items-center gap-2">
                <div class="bg-gradient-to-r from-violet-600 to-indigo-600 p-1.5 rounded-lg">
                    <i data-lucide="brain-circuit" class="w-4 h-4 text-white"></i>
                </div>
                <span class="text-sm font-bold text-white">Agency<span class="text-violet-500">OS</span></span>
            </div>

            <!-- Top Tabs -->
            <nav class="flex items-center gap-1" id="topTabs">
                <!-- Populated by JS -->
            </nav>

            <!-- Right Side: Client Selector + New Client -->
            <div class="flex items-center gap-3">
                <select id="clientSelector" onchange="selectClient(this.value)"
                    class="bg-gray-800 border border-gray-700 text-white text-sm rounded-lg px-3 py-1.5 focus:border-violet-500 focus:outline-none min-w-[200px]">
                    <option value="">Select Client...</option>
                </select>
                <button onclick="showNewClientModal()"
                    class="bg-gradient-to-r from-violet-600 to-indigo-600 hover:from-violet-500 hover:to-indigo-500 text-white px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-1.5">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                    New Client
                </button>
            </div>
        </div>
    </header>

    <!-- Main Layout -->
    <div class="flex-1 flex overflow-hidden">
        <!-- Left Sidebar (Side Tabs) -->
        <aside class="w-48 bg-gray-900 border-r border-gray-800 flex flex-col shrink-0">
            <div class="p-3 border-b border-gray-800">
                <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider" id="sidebarTitle">Navigation</p>
            </div>
            <nav class="flex-1 p-2 space-y-1 overflow-y-auto" id="sideTabs">
                <!-- Populated by JS -->
            </nav>

            <!-- User Info -->
            <div class="p-3 border-t border-gray-800">
                <div class="flex items-center gap-2 mb-2">
                    <div class="w-7 h-7 rounded-full bg-gradient-to-r from-violet-600 to-indigo-600 flex items-center justify-center text-white text-xs font-bold"
                        id="userAvatar">?</div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium text-white truncate" id="userName">Loading...</p>
                        <p class="text-xs text-gray-400 truncate" id="userRole">--</p>
                    </div>
                </div>
                <div class="px-2 pb-3 pt-1 space-y-1">
                    <button onclick="showUserSettingsModal()"
                        class="w-full flex items-center justify-center gap-1.5 px-2 py-1.5 text-xs text-gray-400 hover:text-white hover:bg-gray-800 rounded transition-colors">
                        <i data-lucide="settings" class="w-3 h-3"></i> Settings
                    </button>
                    <button onclick="logout()"
                        class="w-full flex items-center justify-center gap-1.5 px-2 py-1.5 text-xs text-gray-400 hover:text-red-400 hover:bg-gray-800 rounded transition-colors">
                        <i data-lucide="log-out" class="w-3 h-3"></i> Logout
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <!-- Content Header -->
            <div class="h-12 bg-gray-900/50 border-b border-gray-800 flex items-center justify-between px-6 shrink-0">
                <h1 class="text-base font-semibold text-white" id="pageTitle">Dashboard</h1>
                <div class="flex items-center gap-2" id="pageActions">
                    <!-- Actions populated by JS -->
                </div>
            </div>

            <!-- Content -->
            <div class="flex-1 overflow-y-auto p-6" id="contentArea">
                <div class="flex items-center justify-center h-full text-gray-500">
                    <i data-lucide="loader-2" class="w-5 h-5 animate-spin mr-2"></i> Loading...
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Container -->
    <div id="modalOverlay" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden items-center justify-center z-50">
        <div id="modalContent"
            class="bg-gray-900 border border-gray-700 rounded-xl w-full max-w-lg shadow-2xl animate-fade-in">
        </div>
    </div>

    <script>
        // =========================================================================
        // STATE
        // =========================================================================
        let currentUser = null;
        let currentClient = null;
        let currentTopTab = 'dashboard';
        let currentSideTab = 'overview';
        let clients = [];
        let activeAudit = null; // Store currently viewed audit

        // =========================================================================
        // TAB CONFIGURATION
        // =========================================================================
        const TOP_TABS = [
            { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard' },
            { id: 'tech-audit', label: 'Tech Audit', icon: 'search-code' },
            { id: 'social-media', label: 'Social Media', icon: 'instagram' },
            { id: 'client-settings', label: 'Settings', icon: 'settings', clientOnly: true }
        ];

        const SIDE_TABS = {
            'dashboard': [
                { id: 'overview', label: 'Overview' },
                { id: 'clients', label: 'All Clients' }
            ],
            'tech-audit': [
                { id: 'overview', label: 'Audit Overview' }
            ],
            'social-media': [
                { id: 'overview', label: 'Instagram Audits' }
            ],
            'client-settings': [
                { id: 'general', label: 'General' },
                { id: 'google', label: 'Google (GSC, GA4)' }
            ]
        };

        // =========================================================================
        // INIT
        // =========================================================================
        async function init() {
            try {
                const response = await fetch('/api/auth/me');
                if (!response.ok) {
                    window.location.href = '/login.html';
                    return;
                }

                const data = await response.json();
                currentUser = data.user;

                // Reset active audit on full reload
                activeAudit = null;

                // Update user info
                document.getElementById('userName').textContent = currentUser.full_name || currentUser.email.split('@')[0];
                document.getElementById('userRole').textContent = data.role_info?.name || currentUser.role;
                document.getElementById('userAvatar').textContent = (currentUser.full_name || currentUser.email)[0].toUpperCase();

                // Build UI
                buildTopTabs();
                buildSideTabs();
                await loadClients();
                loadContent();

                lucide.createIcons();
            } catch (error) {
                console.error('Init error:', error);
                window.location.href = '/login.html';
            }
        }

        // =========================================================================
        // BUILD UI
        // =========================================================================
        function buildTopTabs() {
            const container = document.getElementById('topTabs');
            // Filter out client-only tabs when no client is selected
            const visibleTabs = TOP_TABS.filter(tab => !tab.clientOnly || currentClient);
            container.innerHTML = visibleTabs.map(tab => `
                <button onclick="switchTopTab('${tab.id}')" 
                    class="top-tab flex items-center gap-1.5 text-sm text-gray-400 transition-colors ${tab.id === currentTopTab ? 'active' : ''}">
                    <i data-lucide="${tab.icon}" class="w-4 h-4"></i>
                    ${tab.label}
                </button>
            `).join('');
            lucide.createIcons();
        }

        function buildSideTabs() {
            const container = document.getElementById('sideTabs');
            const tabs = SIDE_TABS[currentTopTab] || [];
            const titleMap = {
                'dashboard': 'Dashboard',
                'tech-audit': 'Tech Issues',
                'social-media': 'Social Performance',
                'content': 'Content',
                'keywords': 'Keywords',
                'competitors': 'Competitors',
                'links': 'Links',
                'tasks': 'Tasks',
                'reports': 'Reports',
                'client-settings': 'Client Settings'
            };

            document.getElementById('sidebarTitle').textContent = titleMap[currentTopTab] || 'Navigation';

            container.innerHTML = tabs.map(tab => `
                <button onclick="switchSideTab('${tab.id}')" 
                    class="side-tab w-full text-left text-sm text-gray-400 rounded transition-colors ${tab.id === currentSideTab ? 'active' : ''}">
                    ${tab.label}
                </button>
            `).join('');
        }

        // =========================================================================
        // NAVIGATION
        // =========================================================================
        function switchTopTab(tabId) {
            currentTopTab = tabId;
            currentSideTab = SIDE_TABS[tabId]?.[0]?.id || 'overview';
            buildTopTabs();
            buildSideTabs();
            loadContent();
        }

        function switchSideTab(tabId) {
            currentSideTab = tabId;
            buildSideTabs();
            loadContent();
        }

        // =========================================================================
        // CLIENT SELECTOR
        // =========================================================================
        async function loadClients() {
            try {
                const response = await fetch('/api/campaigns');
                const data = await response.json();
                clients = data.campaigns || [];

                const selector = document.getElementById('clientSelector');
                selector.innerHTML = '<option value="">Select Client...</option>' +
                    clients.map(c => `<option value="${c.id}">${c.name} (${c.domain})</option>`).join('');

                // Restore selected client from URL
                const params = new URLSearchParams(window.location.search);
                const clientId = params.get('client');
                if (clientId) {
                    selector.value = clientId;
                    currentClient = clients.find(c => c.id === clientId);
                    // Rebuild tabs to show client-only tabs (like Settings)
                    buildTopTabs();
                }
            } catch (error) {
                console.error('Error loading clients:', error);
            }
        }

        function selectClient(clientId, skipReload = false) {
            currentClient = clients.find(c => c.id === clientId) || null;

            // Update URL
            const url = new URL(window.location);
            if (clientId) {
                url.searchParams.set('client', clientId);
            } else {
                url.searchParams.delete('client');
            }
            window.history.pushState({}, '', url);

            // Only reload if not being chained with another navigation action
            if (!skipReload) {
                loadContent();
            }
        }

        // =========================================================================
        // CONTENT LOADING
        // =========================================================================
        async function loadContent() {
            const contentArea = document.getElementById('contentArea');
            const pageTitle = document.getElementById('pageTitle');
            const pageActions = document.getElementById('pageActions');

            // Show loading
            contentArea.innerHTML = `<div class="flex items-center justify-center h-32 text-gray-500">
                <i data-lucide="loader-2" class="w-5 h-5 animate-spin mr-2"></i> Loading...
            </div>`;
            lucide.createIcons();

            // Set title
            const tab = TOP_TABS.find(t => t.id === currentTopTab);
            const sideTab = SIDE_TABS[currentTopTab]?.find(t => t.id === currentSideTab);
            pageTitle.textContent = sideTab?.label || tab?.label || 'Dashboard';

            // Load based on current tab
            if (currentTopTab === 'dashboard') {
                await loadDashboardContent();
            } else if (!currentClient) {
                contentArea.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-64 text-gray-500">
                        <i data-lucide="folder-open" class="w-12 h-12 mb-4 text-gray-600"></i>
                        <p class="text-lg font-medium">Select a client to view data</p>
                        <p class="text-sm mt-1">Use the dropdown in the top right corner</p>
                    </div>`;
                pageActions.innerHTML = '';
            } else {
                await loadTabContent();
            }

            lucide.createIcons();
        }

        async function loadDashboardContent() {
            const contentArea = document.getElementById('contentArea');
            const pageActions = document.getElementById('pageActions');

            if (currentSideTab === 'overview') {
                pageActions.innerHTML = '';

                try {
                    const [campaignsRes] = await Promise.all([
                        fetch('/api/campaigns')
                    ]);
                    const campaigns = await campaignsRes.json().then(data => data.campaigns || []);

                    const stats = {
                        clients: campaigns.length,
                        pending: 0,
                        inProgress: 0,
                        completed: 0
                    };

                    contentArea.innerHTML = `
                        <div class="grid grid-cols-4 gap-4 mb-6">
                            <div class="bg-gray-900 border border-gray-800 rounded-xl p-4">
                                <div class="flex items-center gap-3">
                                    <div class="p-2 bg-blue-500/20 rounded-lg">
                                        <i data-lucide="building" class="w-5 h-5 text-blue-400"></i>
                                    </div>
                                    <div>
                                        <p class="text-2xl font-bold text-white">${stats.clients}</p>
                                        <p class="text-xs text-gray-400">Active Clients</p>
                                    </div>
                                </div>
                            </div>
                            <div class="bg-gray-900 border border-gray-800 rounded-xl p-4">
                                <div class="flex items-center gap-3">
                                    <div class="p-2 bg-yellow-500/20 rounded-lg">
                                        <i data-lucide="clock" class="w-5 h-5 text-yellow-400"></i>
                                    </div>
                                    <div>
                                        <p class="text-2xl font-bold text-white">${stats.pending}</p>
                                        <p class="text-xs text-gray-400">Pending Tasks</p>
                                    </div>
                                </div>
                            </div>
                            <div class="bg-gray-900 border border-gray-800 rounded-xl p-4">
                                <div class="flex items-center gap-3">
                                    <div class="p-2 bg-violet-500/20 rounded-lg">
                                        <i data-lucide="loader-2" class="w-5 h-5 text-violet-400"></i>
                                    </div>
                                    <div>
                                        <p class="text-2xl font-bold text-white">${stats.inProgress}</p>
                                        <p class="text-xs text-gray-400">In Progress</p>
                                    </div>
                                </div>
                            </div>
                            <div class="bg-gray-900 border border-gray-800 rounded-xl p-4">
                                <div class="flex items-center gap-3">
                                    <div class="p-2 bg-emerald-500/20 rounded-lg">
                                        <i data-lucide="check-circle" class="w-5 h-5 text-emerald-400"></i>
                                    </div>
                                    <div>
                                        <p class="text-2xl font-bold text-white">${stats.completed}</p>
                                        <p class="text-xs text-gray-400">Completed</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="bg-gray-900 border border-gray-800 rounded-xl">
                            <div class="px-4 py-3 border-b border-gray-800 flex items-center justify-between">
                                <h3 class="text-sm font-semibold text-white">Recent Tasks</h3>
                                <button onclick="switchTopTab('tasks')" class="text-xs text-violet-400 hover:text-violet-300">View all →</button>
                            </div>
                            <div class="divide-y divide-gray-800">
                                <p class="px-4 py-8 text-center text-gray-500">Task Management removed in DIFFERENT AUDITS</p>
                            </div>
                        </div>
                    `;
                } catch (error) {
                    contentArea.innerHTML = `<div class="text-red-400">Error: ${error.message}</div>`;
                }
            } else if (currentSideTab === 'clients') {
                pageActions.innerHTML = `
                    <button onclick="showNewClientModal()" class="bg-violet-600 hover:bg-violet-500 text-white px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-1.5">
                        <i data-lucide="plus" class="w-4 h-4"></i> New Client
                    </button>`;

                try {
                    const response = await fetch('/api/campaigns');
                    const { campaigns } = await response.json();

                    if (!campaigns?.length) {
                        contentArea.innerHTML = `
                            <div class="flex flex-col items-center justify-center h-64 text-center">
                                <i data-lucide="folder-plus" class="w-12 h-12 text-gray-600 mb-4"></i>
                                <h3 class="text-lg font-semibold text-white mb-2">No clients yet</h3>
                                <p class="text-gray-400 mb-4">Add your first client to get started</p>
                                <button onclick="showNewClientModal()" class="bg-violet-600 hover:bg-violet-500 text-white px-4 py-2 rounded-lg text-sm font-medium">
                                    + Add Client
                                </button>
                            </div>`;
                    } else {
                        contentArea.innerHTML = `
                            <div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden">
                                <table class="w-full">
                                    <thead class="bg-gray-900/50 text-xs uppercase text-gray-400 border-b border-gray-800">
                                        <tr>
                                            <th class="px-4 py-3 text-left font-medium">Client</th>
                                            <th class="px-4 py-3 text-left font-medium">Domain</th>
                                            <th class="px-4 py-3 text-left font-medium">Status</th>
                                            <th class="px-4 py-3 text-left font-medium">Created</th>
                                            <th class="px-4 py-3 text-right font-medium">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-gray-800 text-sm">
                                        ${campaigns.map(c => `
                                            <tr class="hover:bg-gray-800/30 cursor-pointer" onclick="selectClient('${c.id}', true); switchTopTab('tech-audit');">
                                                <td class="px-4 py-3 font-medium text-white">${c.name}</td>
                                                <td class="px-4 py-3 text-gray-400">${c.domain}</td>
                                                <td class="px-4 py-3">
                                                    <span class="px-2 py-1 text-xs rounded ${c.status === 'active' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-gray-700 text-gray-400'}">${c.status}</span>
                                                </td>
                                                <td class="px-4 py-3 text-gray-500">${new Date(c.created_at).toLocaleDateString()}</td>
                                                <td class="px-4 py-3 text-right">
                                                    <button class="text-gray-400 hover:text-white">
                                                        <i data-lucide="chevron-right" class="w-4 h-4"></i>
                                                    </button>
                                                </td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>`;
                    }
                } catch (error) {
                    contentArea.innerHTML = `<div class="text-red-400">Error: ${error.message}</div>`;
                }
            } else if (currentSideTab === 'team') {
                pageActions.innerHTML = `
                    <button onclick="showInviteModal()" class="bg-violet-600 hover:bg-violet-500 text-white px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-1.5">
                        <i data-lucide="user-plus" class="w-4 h-4"></i> Invite Member
                    </button>`;
                contentArea.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-64 text-center text-gray-500">
                        <i data-lucide="users" class="w-12 h-12 text-gray-600 mb-4"></i>
                        <p>Team management coming soon</p>
                    </div>`;
            } else if (currentSideTab === 'settings') {
                pageActions.innerHTML = '';
                contentArea.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-64 text-center text-gray-500">
                        <i data-lucide="settings" class="w-12 h-12 text-gray-600 mb-4"></i>
                        <p>Settings page coming soon</p>
                    </div>`;
            }

            lucide.createIcons();
        }

        async function loadTabContent() {
            const contentArea = document.getElementById('contentArea');
            const pageActions = document.getElementById('pageActions');

            // Placeholder for client-specific tabs
            pageActions.innerHTML = '';

            if (currentTopTab === 'tech-audit') {
                await loadAuditContent();
            } else if (currentTopTab === 'social-media') {
                pageActions.innerHTML = '';
                contentArea.classList.remove('p-6');
                contentArea.classList.add('p-0');
                contentArea.innerHTML = `<iframe src="/social-media-home.html" class="w-full h-full border-0 min-h-[800px]"></iframe>`;
                return;
            } else if (currentTopTab === 'competitors') {
                await loadCompetitorContent();
            } else if (currentTopTab === 'tasks') {
                await loadTasksContent();
            } else if (currentTopTab === 'client-settings') {
                await loadClientSettingsContent();
            } else if (currentTopTab === 'reports' && currentSideTab === 'analytics') {
                await loadAnalyticsDashboard();
            } else {
                contentArea.innerHTML = `
                    <div class="bg-gray-900 border border-gray-800 rounded-xl p-8 text-center">
                        <i data-lucide="construction" class="w-12 h-12 text-gray-600 mx-auto mb-4"></i>
                        <h3 class="text-lg font-semibold text-white mb-2">${currentClient?.name || 'Client'} — ${currentSideTab.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase())}</h3>
                        <p class="text-gray-400">This section will show ${currentSideTab} data for ${currentClient?.domain || 'selected client'}.</p>
                        <p class="text-xs text-gray-500 mt-4">Implementation coming in Phase 2</p>
                    </div>`;
            }

            lucide.createIcons();
        }

        async function loadAnalyticsDashboard() {
            const contentArea = document.getElementById('contentArea');
            const pageActions = document.getElementById('pageActions');

            if (!currentClient || !currentClient.settings) {
                contentArea.innerHTML = `<div class="text-center text-gray-500 py-12">No client selected or settings missing.</div>`;
                return;
            }

            const gscProp = currentClient.settings.gsc_property;
            const ga4Prop = currentClient.settings.ga4_property;

            if (!gscProp && !ga4Prop) {
                contentArea.innerHTML = `
                    <div class="bg-gray-900 border border-gray-800 rounded-xl p-8 text-center max-w-2xl mx-auto mt-8">
                        <i data-lucide="alert-triangle" class="w-12 h-12 text-yellow-500 mx-auto mb-4"></i>
                        <h3 class="text-lg font-semibold text-white mb-2">No Google Properties Connected</h3>
                        <p class="text-gray-400 mb-6">Please go to Client Settings &gt; Google (GSC, GA4) to map a property to this client.</p>
                        <button onclick="switchSideTab('google'); switchTopTab('client-settings');" class="bg-violet-600 hover:bg-violet-500 text-white px-4 py-2 rounded-lg text-sm font-medium">
                            Go to Settings
                        </button>
                    </div>`;
                lucide.createIcons();
                return;
            }

            contentArea.innerHTML = `<div class="flex items-center justify-center p-12"><i data-lucide="loader-2" class="w-8 h-8 text-violet-500 animate-spin"></i><span class="ml-3 text-gray-400">Fetching live Google data...</span></div>`;
            lucide.createIcons();

            try {
                const response = await fetch('/api/google/metrics', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        gsc_property: gscProp,
                        ga4_property: ga4Prop,
                        start_date: '30daysAgo',
                        end_date: 'today'
                    })
                });

                const data = await response.json();

                if (data.error) {

        async function saveClientSettings() {
            if (!currentClient) return;

            // Collect all settings from current page
            const settings = { ...currentClient.settings };

            // General
            const name = document.getElementById('setting_name');
            const domain = document.getElementById('setting_domain');
            const language = document.getElementById('setting_language');
            const location = document.getElementById('setting_location');

            if (language) settings.language = language.value;
            if (location) settings.location = location.value;

            // Google
            const gscProperty = document.getElementById('setting_gsc_property');
            const ga4Property = document.getElementById('setting_ga4_property');
            if (gscProperty) settings.gsc_property = gscProperty.value;
            if (ga4Property) settings.ga4_property = ga4Property.value;

            // CMS
            const wpUrl = document.getElementById('setting_wp_url');
            const wpUser = document.getElementById('setting_wp_user');
            const wpAppPassword = document.getElementById('setting_wp_app_password');
            const shopifyStore = document.getElementById('setting_shopify_store');
            const shopifyToken = document.getElementById('setting_shopify_token');
            if (wpUrl) settings.wp_url = wpUrl.value;
            if (wpUser) settings.wp_user = wpUser.value;
            if (wpAppPassword) settings.wp_app_password = wpAppPassword.value;
            if (shopifyStore) settings.shopify_store = shopifyStore.value;
            if (shopifyToken) settings.shopify_token = shopifyToken.value;

            // Analytics
            const clarityId = document.getElementById('setting_clarity_id');
            const ahrefsToken = document.getElementById('setting_ahrefs_token');
            if (clarityId) settings.clarity_id = clarityId.value;
            if (ahrefsToken) settings.ahrefs_token = ahrefsToken.value;

            // Competitors
            const competitorInputs = document.querySelectorAll('.competitor-input');
            if (competitorInputs.length) {
                settings.competitors = Array.from(competitorInputs).map(i => i.value).filter(v => v.trim());
            }

            // Prepare update data
            const updateData = { settings };
            if (name) updateData.name = name.value;
            if (domain) updateData.domain = domain.value;

            try {
                const res = await fetch(`/api/campaigns/${currentClient.id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updateData)
                });

                if (res.ok) {
                    const { campaign } = await res.json();
                    // Update local state
                    currentClient = campaign;
                    const idx = clients.findIndex(c => c.id === campaign.id);
                    if (idx >= 0) clients[idx] = campaign;

                    showModal(`
                    <div class="p-6 text-center">
                            <div class="w-12 h-12 mx-auto mb-4 bg-emerald-500/20 rounded-full flex items-center justify-center">
                                <i data-lucide="check" class="w-6 h-6 text-emerald-400"></i>
                            </div>
                            <h3 class="text-lg font-semibold text-white mb-2">Settings Saved</h3>
                            <p class="text-gray-400 text-sm mb-4">Client settings have been updated.</p>
                            <button onclick="hideModal()" class="bg-violet-600 hover:bg-violet-500 text-white px-4 py-2 rounded-lg text-sm font-medium">OK</button>
                        </div>
                    `);
                    lucide.createIcons();
                } else {
                    const err = await res.json();
                    alert(err.error || 'Failed to save settings');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        async function changePassword(e) {
            e.preventDefault();
            const form = e.target;
            const current_password = form.current_password.value;
            const new_password = form.new_password.value;
            const confirm_password = form.confirm_password.value;

            if (new_password !== confirm_password) {
                alert("New passwords do not match");
                return;
            }

            const btn = form.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = 'Updating...';

        async function runAudit(isCompetitor = false, competitorDomain = null, maxPages = 200, templateType = 'local') {
            if (!confirm(isCompetitor ? 'Start a comprehensive technical audit for this competitor?' : 'Start a new comprehensive technical audit? This usually takes a few minutes depending on page count.')) return;

            const btn = event.currentTarget || document.querySelector('button[onclick*="runAudit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Starting...`;
            btn.disabled = true;

            // Show loading state immediately based on view
            if (!isCompetitor) {
                loadAuditContent();
            } else {
                loadCompetitorsContent();
            }

            try {
                const payload = {
                    campaign_id: currentClient.id,
                    max_pages: maxPages,
                    template_type: templateType
                };
                if (isCompetitor && competitorDomain) {
                    payload.type = 'competitor';
                    payload.competitor_domain = competitorDomain;
                } else {
                    payload.type = 'technical';
                }

                const response = await fetch('/api/audits', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error('Failed to start audit');

                if (!isCompetitor) {
                    await loadAuditContent();
                } else {
                    await loadCompetitorsContent();
                }
            } catch (error) {
                alert('Error: ' + error.message);
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        async function checkAuditStatus(auditId) {
            try {
                const response = await fetch(`/api/audits/${auditId}`);
                const data = await response.json();

                if (data.audit && data.audit.status === 'completed') {
                    // It finished! Reload list to show "View Results"
                    await loadAuditContent();
                } else {
                    // Still running, maybe show a toast
                    const btn = document.querySelector(`button[onclick="checkAuditStatus('${auditId}')"]`);
                    if (btn) {
                        const original = btn.innerHTML;
                        btn.innerHTML = `<i data-lucide="check" class="w-3 h-3 text-emerald-400"></i> Still running...`;
                        setTimeout(() => btn.innerHTML = original, 2000);
                    }
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function startSlideGeneration(auditId, templateType = 'local') {
            // Show loading modal
            const modal = document.createElement('div');
            modal.id = 'slideGenModal';
            modal.className = 'fixed inset-0 bg-black/70 z-50 flex items-center justify-center backdrop-blur-sm';
            modal.innerHTML = `
                    <div class="bg-gray-900 border border-gray-800 rounded-xl p-8 max-w-md w-full mx-4 shadow-2xl text-center">
                    <div class="mb-6">
                        <div class="w-16 h-16 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
                    </div>
                    <h3 class="text-xl font-bold text-white mb-2">Generating Presentation</h3>
                    <p id="slideGenStatus" class="text-gray-400 text-sm mb-4">Loading audit data & running analysis...</p>
                    <div class="w-full bg-gray-800 rounded-full h-2 mb-4">
                        <div id="slideGenProgress" class="bg-indigo-500 h-2 rounded-full transition-all duration-500" style="width: 10%"></div>
                    </div>
                    <p class="text-gray-500 text-xs">This may take 1-2 minutes. Do not close this window.</p>
                </div>
                    `;
            document.body.appendChild(modal);
            lucide.createIcons();

            // Progress updates
            const updateProgress = (pct, text) => {
                const bar = document.getElementById('slideGenProgress');
                const status = document.getElementById('slideGenStatus');
                if (bar) bar.style.width = pct + '%';
                if (status) status.textContent = text;
            };

            // Simulate progress stages
            setTimeout(() => updateProgress(20, 'Running PageSpeed & readability analysis...'), 2000);
            setTimeout(() => updateProgress(40, 'Rendering audit dashboard...'), 5000);
            setTimeout(() => updateProgress(60, 'Capturing screenshots...'), 10000);
            setTimeout(() => updateProgress(75, 'Building Google Slides presentation...'), 20000);

            // Create hidden iframe
            const iframe = document.createElement('iframe');
            iframe.id = 'slideGenIframe';
            // Route social_media template to its own dashboard
            const dashboardPage = templateType === 'social_media' ? 'social-media-dashboard.html' : 'audit-dashboard.html';
            iframe.src = `/${dashboardPage}?audit_id=${auditId}&auto_generate=true&template_type=${templateType}`;
            iframe.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:1400px;height:900px;opacity:0;pointer-events:none;';
            document.body.appendChild(iframe);

            // Listen for postMessage from iframe
            const messageHandler = (event) => {
                if (event.data?.type === 'slides-ready') {
                    slidesDone = true;
                    clearInterval(pollInterval);
                    window.removeEventListener('message', messageHandler);

                    updateProgress(100, 'Presentation ready!');

                    // Save the slides_url to the audit record
                    fetch(`/api/audits/${auditId}/slides-url`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ slides_url: event.data.presentation_url })
                    }).catch(e => console.warn('Could not save slides URL:', e));

                    setTimeout(() => {
                        // Remove iframe and modal
                        const iframeEl = document.getElementById('slideGenIframe');
                        if (iframeEl) iframeEl.remove();

                        // Replace modal content with success
                        const modalEl = document.getElementById('slideGenModal');
                        if (modalEl) {
                            modalEl.innerHTML = `
                                <div class="bg-gray-900 border border-gray-800 rounded-xl p-8 max-w-md w-full mx-4 shadow-2xl text-center">
                                    <div class="text-5xl mb-4">✅</div>
                                    <h3 class="text-xl font-bold text-white mb-2">Presentation Ready!</h3>
                                    <p class="text-gray-400 text-sm mb-6">Your Google Slides presentation has been created.</p>
                                    <div class="flex gap-3 justify-center">
                                        <a href="${event.data.presentation_url}" target="_blank" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2.5 rounded-lg font-medium flex items-center gap-2">
                                            <i data-lucide="external-link" class="w-4 h-4"></i> Open Presentation
                                        </a>
                                        <button onclick="document.getElementById('slideGenModal').remove()" class="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2.5 rounded-lg font-medium border border-gray-700">
                                            Close
                                        </button>
                                    </div>
                                </div>
                            `;
                            lucide.createIcons();
                        }
                    }, 1000);

                } else if (event.data?.type === 'slides-error') {
                    slidesDone = true;
                    clearInterval(pollInterval);
                    window.removeEventListener('message', messageHandler);

                    const iframeEl = document.getElementById('slideGenIframe');
                    if (iframeEl) iframeEl.remove();

                    const modalEl = document.getElementById('slideGenModal');
                    if (modalEl) {
                        modalEl.innerHTML = `
                            <div class="bg-gray-900 border border-gray-800 rounded-xl p-8 max-w-md w-full mx-4 shadow-2xl text-center">
                                <div class="text-5xl mb-4">❌</div>
                                <h3 class="text-xl font-bold text-white mb-2">Generation Failed</h3>
                                <p class="text-red-400 text-sm mb-6">${event.data.error || 'Unknown error occurred'}</p>
                                <button onclick="document.getElementById('slideGenModal').remove()" class="bg-gray-800 hover:bg-gray-700 text-white px-6 py-2.5 rounded-lg font-medium border border-gray-700">
                                    Close
                                </button>
                            </div>
                        `;
                    }
                }
            };
            window.addEventListener('message', messageHandler);

            // Poll audit record as fallback (in case postMessage from iframe is lost)
            let slidesDone = false;
            let existingPresUrl = null;
            // Record existing presentation_url so we only trigger on NEW ones
            try {
                const initRes = await fetch(`/api/audits/${auditId}`);
                const initData = await initRes.json();
                existingPresUrl = initData?.results?.presentation_url || null;
            } catch (e) { }
            const pollInterval = setInterval(async () => {
                if (slidesDone) { clearInterval(pollInterval); return; }
                try {
                    const res = await fetch(`/api/audits/${auditId}`);
                    const auditData = await res.json();
                    const presUrl = auditData?.results?.presentation_url;
                    if (presUrl && presUrl !== existingPresUrl && !slidesDone) {
                        slidesDone = true;
                        clearInterval(pollInterval);
                        window.removeEventListener('message', messageHandler);
                        const iframeEl = document.getElementById('slideGenIframe');
                        if (iframeEl) iframeEl.remove();

                        updateProgress(100, 'Presentation ready!');
                        fetch(`/api/audits/${auditId}/slides-url`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ slides_url: presUrl })
                        }).catch(e => console.warn('Could not save slides URL:', e));

                        setTimeout(() => {
                            const modalEl = document.getElementById('slideGenModal');
                            if (modalEl) {
                                modalEl.innerHTML = `
                                    <div class="bg-gray-900 border border-gray-800 rounded-xl p-8 max-w-md w-full mx-4 shadow-2xl text-center">
                                        <div class="text-5xl mb-4">✅</div>
                                        <h3 class="text-xl font-bold text-white mb-2">Presentation Ready!</h3>
                                        <p class="text-gray-400 text-sm mb-6">Your Google Slides presentation has been created.</p>
                                        <div class="flex gap-3 justify-center">
                                            <a href="${presUrl}" target="_blank" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2.5 rounded-lg font-medium flex items-center gap-2">
                                                <i data-lucide="external-link" class="w-4 h-4"></i> Open Presentation
                                            </a>
                                            <button onclick="document.getElementById('slideGenModal').remove()" class="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2.5 rounded-lg font-medium border border-gray-700">
                                                Close
                                            </button>
                                        </div>
                                    </div>
                                `;
                                lucide.createIcons();
                            }
                        }, 1000);
                    }
                } catch (e) { /* ignore poll errors */ }
            }, 15000); // Check every 15 seconds

            // Timeout after 8 minutes
            setTimeout(() => {
                if (slidesDone) return;
                clearInterval(pollInterval);
                const iframeEl = document.getElementById('slideGenIframe');
                if (iframeEl) {
                    iframeEl.remove();
                    window.removeEventListener('message', messageHandler);

                    const modalEl = document.getElementById('slideGenModal');
                    if (modalEl) {
                        modalEl.innerHTML = `
                            <div class="bg-gray-900 border border-gray-800 rounded-xl p-8 max-w-md w-full mx-4 shadow-2xl text-center">
                                <div class="text-5xl mb-4">⏰</div>
                                <h3 class="text-xl font-bold text-white mb-2">Generation Timed Out</h3>
                                <p class="text-gray-400 text-sm mb-6">The process took too long. Please try again.</p>
                                <button onclick="document.getElementById('slideGenModal').remove()" class="bg-gray-800 hover:bg-gray-700 text-white px-6 py-2.5 rounded-lg font-medium border border-gray-700">
                                    Close
                                </button>
                            </div>
                        `;
                    }
                }
            }, 480000);
        }

        async function handleAddCompetitorSubmit() {
            const input = document.getElementById('competitorDomainInput');
            const limitInput = document.getElementById('competitorPageLimitInput');
            let domain = input.value.trim();
            if (!domain) {
                alert("Please enter a domain.");
                return;
            }
            // Strip http/https/www
            domain = domain.replace(/^(https?:\/\/)?(www\.)?/, '').split('/')[0];

            let maxPages = 200;
            if (limitInput && limitInput.value) {
                maxPages = parseInt(limitInput.value);
            }

            document.getElementById('addCompetitorModal').classList.add('hidden');

            // Re-use runAudit logic and pass flags
            await runAudit(true, domain, maxPages);
        }

        async function runCompetitorAnalysis() {
            const inputs = document.querySelectorAll('.competitor-input');
            const competitors = Array.from(inputs).map(i => i.value.trim()).filter(v => v);

            if (competitors.length === 0) {
                alert('Please enter at least one competitor domain.');
                return;
            }

            const btn = document.querySelector('button[onclick="runCompetitorAnalysis()"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Analyzing...`;
            btn.disabled = true;

            try {
                const response = await fetch('/api/competitors/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        campaign_id: currentClient.id,
                        competitors: competitors
                    })
                });

                const data = await response.json();

                if (!response.ok) throw new Error(data.error || 'Analysis failed');

                // Reload client data to get updated settings
                const clientRes = await fetch(`/api/campaigns/${currentClient.id}`);
                const clientData = await clientRes.json();
                currentClient = clientData.campaign;

                // Refresh content
                await loadCompetitorContent();

            } catch (error) {
                alert('Error: ' + error.message);
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        async function updateTaskStatus(taskId, newStatus) {
            try {
                const res = await fetch(`/api/tasks/${taskId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });

                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.error || 'Failed to update status on server');
                }

                // Update local state and trigger re-render
                const taskIndex = currentLoadedTasks.findIndex(t => t.id === taskId);
                if (taskIndex !== -1) {
                    currentLoadedTasks[taskIndex].status = newStatus;
                }
                window.renderTasksTable();

            } catch (e) {
                console.error(e);
                alert('Task update failed: ' + e.message);
                // Revert UI by re-rendering
                window.renderTasksTable();
            }
        }

                        <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Audits
                    </button>
                    <div class="h-4 w-px bg-gray-700"></div>
                    <span class="text-sm text-gray-400">Viewing Audit: ${new Date(activeAudit.created_at).toLocaleDateString()}</span>
                    
                    ${activeAudit.slides_url ?
                    `<a href="${activeAudit.slides_url}" target="_blank" class="bg-violet-600 hover:bg-violet-500 text-white px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-1.5 ml-2">
                            <i data-lucide="presentation" class="w-4 h-4"></i> View Slides
                        </a>` :
                    `<button id="btn-slides-${activeAudit.id}" onclick="generateSlides('${activeAudit.id}')" class="bg-gray-800 hover:bg-gray-700 text-white px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-1.5 ml-2 border border-gray-700">
                             <i data-lucide="presentation" class="w-4 h-4"></i> Generate Slides
                         </button>`
                }
                </div>`;

            if (!categorized) {
                // Fallback for old audits or incomplete data
                contentArea.innerHTML = `
                    <div class="text-center py-12">
                        <i data-lucide="alert-circle" class="w-12 h-12 text-yellow-500 mx-auto mb-4"></i>
                        <h3 class="text-lg font-semibold text-white mb-2">Legacy Audit Format</h3>
                        <p class="text-gray-400 mb-6">This audit uses an older data format. Please run a new audit to see the detailed 3-column breakdown.</p>
                        <button onclick="activeAudit=null; runAudit()" class="bg-violet-600 hover:bg-violet-500 text-white px-4 py-2 rounded-lg text-sm font-medium">
                            Run New Audit
                        </button>
                    </div>`;
                lucide.createIcons();
                return;
            }

            // Helper to render a category column
            const renderCategoryColumn = (title, icon, itemsKey) => {
                const categoryData = categorized[itemsKey] || {};
                const checks = Object.entries(categoryData);

                return `
                    <div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden flex flex-col h-full">
                        <div class="p-4 border-b border-gray-800 flex items-center gap-3 bg-gray-800/50">
                            <div class="p-2 bg-gray-800 rounded-lg">
                                <i data-lucide="${icon}" class="w-5 h-5 text-gray-400"></i>
                            </div>
                            <h3 class="font-semibold text-white">${title}</h3>
                        </div>
                        <div class="p-4 space-y-3 flex-1">
                            ${checks.length > 0 ? checks.map(([key, data]) => {
                    const label = key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                    const isPass = data.status === 'pass' || data.issues === 0;
                    const hasIssues = data.issues > 0;
                    const statusColor = hasIssues ? 'text-red-400' : 'text-emerald-400';
                    const iconName = hasIssues ? 'alert-circle' : 'check-circle';

                    return `
                                    <div onclick="showAuditItemDetails('${itemsKey}', '${key}')" class="bg-black/20 rounded-lg p-3 border border-gray-800 hover:border-gray-700 transition-colors cursor-pointer">
                                        <div class="flex items-center justify-between mb-1">
                                            <span class="text-sm font-medium text-gray-300">${label}</span>
                                            <i data-lucide="${iconName}" class="w-4 h-4 ${statusColor}"></i>
                                        </div>
                                        <div class="flex items-center justify-between">
                                            <span class="text-xs text-gray-500">${data.items?.length || 0} items</span>
                                            ${data.score !== undefined ? `<span class="text-xs font-mono text-gray-400">Score: ${data.score}</span>` : ''}
                                            ${hasIssues ? `<span class="text-xs bg-red-500/10 text-red-400 px-1.5 py-0.5 rounded">${data.issues} issues</span>` : ''}
                                        </div>
                                        ${data.items && data.items.length > 0 ? `
                                            <div class="mt-2 pt-2 border-t border-gray-800/50">
                                                <div class="text-xs text-gray-500 font-mono truncate cursor-pointer hover:text-gray-300" title="${data.items[0]}">
                                                    ${data.items[0]}
                                                </div>
                                                ${data.items.length > 1 ? `<div class="text-[10px] text-gray-600 mt-0.5">+${data.items.length - 1} more</div>` : ''}
                                            </div>
                                        ` : ''}
                                    </div>
                                `;
                }).join('') : '<div class="text-gray-500 text-sm text-center py-4">No data available</div>'}
                        </div>
                    </div>
                    `;
            };

            contentArea.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 pb-8">
                    ${renderCategoryColumn('Architecture', 'server', 'architecture')}
                    ${renderCategoryColumn('Accessibility', 'accessibility', 'accessibility')}
                    ${renderCategoryColumn('Usability', 'mouse-pointer-click', 'usability')}
                </div>
            `;

            lucide.createIcons();
        }

        // Start
        init();
        function connectGoogleAccount() {
            if (!currentUser) {
                alert('Please sign in first');
                return;
            }
            window.location.href = '/api/google/auth?user_id=' + currentUser.id;
        }

        async function syncGoogleProperties() {
            try {
                const btn = document.getElementById('syncPropsBtn');
                const resultDiv = document.getElementById('googleSyncResult');

                btn.disabled = true;
                btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Syncing...';
                resultDiv.classList.add('hidden');

                const response = await fetch('/api/google/sync-properties', {
                    method: 'POST'
                });

                const data = await response.json();

                if (data.success) {
                    resultDiv.textContent = '✅ ' + data.message;
                    resultDiv.className = 'text-xs mt-3 text-green-400 block';

                    // Refresh client settings content if open to update property dropdowns
                    if (currentSideTab === 'google') {
                        loadClientSettingsContent();
                    }
                } else {
                    resultDiv.textContent = '❌ Error: ' + (data.error || 'Failed to sync');
                    resultDiv.className = 'text-xs mt-3 text-red-400 block';
                }
            } catch (err) {
                console.error(err);
                const resultDiv = document.getElementById('googleSyncResult');
                resultDiv.textContent = '❌ ' + (err.message || 'Error syncing properties');
                resultDiv.className = 'text-xs mt-3 text-red-400 block';
            } finally {
                const btn = document.getElementById('syncPropsBtn');
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="refresh-cw" class="w-4 h-4"></i> Sync Properties';
                lucide.createIcons();
            }
        }
    </script>
</body>

</html>
